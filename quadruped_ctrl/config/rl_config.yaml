# RL-specific configuration (separate from sim_config)

obs_noise:
  base_lin_vel_std: 0.01


action:
  range: 1
  offset_scale: 0.5
  max_delta: 0.1
  smooth:
    type: "lowpass"  # "none" | "lowpass" | "rate_limit"
    alpha: 0.2     # for lowpass
    max_delta: 0.1 # for rate_limit

# reward:
#   vel_sigma: 0.25
#   weights:
#     vel: 2.0
#     alive: 0.02
#     tilt: 0.5
#     energy: 0.0001
#     action_delta: 1.0
#     swing: 0.5      # Reward for foot velocity during swing phase (gait-aware)
#     contact: 0.5    # Penalty for contact state mismatch with gait schedule
#   alive: 1.0
reward:
  vel_sigma: 0.25
  weights:
    vel: 10.0       
    alive: 0.1     
    tilt: 5.0       
    energy: 0.0001 
    action_delta: 0.01 
    swing: 0.1     
    contact: 1.0   
  alive: 1.0